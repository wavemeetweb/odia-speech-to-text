<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ଓଡ଼ିଆ Voice-to-Text (Smart Dictionary)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .app-card {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 550px;
            text-align: center;
            border-top: 5px solid #ff9933;
        }
        h1 {
            color: #ffffff;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 5px;
        }
        .sub-title {
            font-size: 14px;
            color: #a0aec0;
            margin-bottom: 20px;
        }
        #output-box {
            width: 100%;
            height: 220px;
            border: 2px solid #333333;
            border-radius: 10px;
            padding: 14px;
            font-size: 18px;
            line-height: 1.6;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 20px;
            background-color: #2d2d2d;
            color: #ffffff;
            transition: border-color 0.2s;
        }
        #output-box:focus {
            border-color: #ff9933;
            outline: none;
        }
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        button {
            padding: 12px 24px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        .btn-start { background-color: #10b981; color: #ffffff; }
        .btn-start:hover { background-color: #059669; }
        .btn-start:disabled { background-color: #4a5568; color: #a0aec0; cursor: not-allowed; }
        
        .btn-stop { background-color: #ef4444; color: #ffffff; }
        .btn-stop:hover { background-color: #dc2626; }
        .btn-stop:disabled { background-color: #4a5568; color: #a0aec0; cursor: not-allowed; }
        
        .btn-copy { background-color: #3b82f6; color: #ffffff; }
        .btn-copy:hover { background-color: #2563eb; }
        
        .status-text {
            margin-top: 18px;
            font-size: 13px;
            color: #a0aec0;
            font-weight: 500;
        }
        .info-tag {
            background-color: #2a3441;
            color: #93c5fd;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 15px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="app-card">
    <h1>ଓଡ଼ିଆ Voice to Text</h1>
    <div class="sub-title">100% Free Public Utility App</div>
    
    <div class="info-tag">💡 Custom Dictionary Enabled. Try saying 'namaskar', 'dhanyabad', or 'kemiti achha'!</div>
    
    <textarea id="output-box" placeholder="ଏଠାରେ କ୍ଲିକ୍ କରି କୁହନ୍ତୁ କିମ୍ବା ଟାଇପ୍ କରନ୍ତୁ..."></textarea>
    
    <div class="actions">
        <button class="btn-start" id="start-btn">Start Mic</button>
        <button class="btn-stop" id="stop-btn" disabled>Stop Mic</button>
        <button class="btn-copy" id="copy-btn">Copy Text</button>
    </div>
    
    <div class="status-text" id="status">Ready. Click 'Start Mic'.</div>
</div>

<script>
    // 📖 YOUR CUSTOM ODIA DICTIONARY 
    // You can add as many words as you want here! 
    // Format: 'what_browser_hears': 'correct_odia_spelling'
    const OdiaDictionary = {
        'namaskar': 'ନମସ୍କାର',
        'namaskara': 'ନମସ୍କାର',
        'dhanyabad': 'ଧନ୍ୟବାଦ',
        'dhanyabada': 'ଧନ୍ୟବାଦ',
        'kemiti': 'କେମିତି',
        'acha': 'ଅଛ',
        'achha': 'ଅଛନ୍ତି',
        'odisha': 'ଓଡ଼ିଶା',
        'oriya': 'ଓଡ଼ିଆ',
        'odia': 'ଓଡ଼ିଆ',
        'kichi': 'କିଛି',
        'katha': 'କଥା',
        'nahi': 'ନାହିଁ',
        'bhala': 'ଭଲ',
        'jay': 'ଜୟ',
        'jaganath': 'ଜଗନ୍ନାଥ',
        'jagannath': 'ଜଗନ୍ନାଥ',
        'bapa': 'ବାପା',
        'maa': 'ମା',
        'ghara': 'ଘର',
        'khabar': 'ଖବର'
    };

    // Fallback alphabetic map if the exact word isn't in your dictionary list
    const CharacterMap = {
        'a': 'ଅ', 'aa': 'ଆ', 'i': 'ଇ', 'ee': 'ଈ', 'u': 'ଉ', 'oo': 'ଊ', 'e': 'ଏ', 'ai': 'ଐ', 'o': 'ଓ', 'au': 'ଔ',
        'k': 'କ', 'kh': 'ଖ', 'g': 'ଗ', 'gh': 'ଘ', 'n': 'ଙ', 'c': 'ଚ', 'ch': 'ଛ', 'j': 'ଜ', 'jh': 'ଝ',
        't': 'ଟ', 'th': 'ଠ', 'd': 'ଡ', 'dh': 'ଢ', 'p': 'ପ', 'ph': 'ଫ', 'b': 'ବ', 'bh': 'ଭ', 'm': 'ମ',
        'y': 'ଯ', 'r': 'ର', 'l': 'ଲ', 'w': 'ୱ', 'ś': 'ଶ', 'sh': 'ଷ', 's': 'ସ', 'h': 'ହ'
    };

    function processWordThroughDictionary(word) {
        if (!word) return "";
        
        // Clean out trailing punctuation symbols
        let cleanWord = word.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g,"").trim();
        if (!cleanWord) return "";

        // 1. First target check: Look up the whole word inside our custom dictionary
        if (OdiaDictionary[cleanWord]) {
            return OdiaDictionary[cleanWord];
        }

        // 2. Second target check: If it's already written in Odia script directly, keep it
        if (/[\u0B00-\u0B7F]/.test(cleanWord)) {
            return cleanWord;
        }

        // 3. Fallback check: Character by character matching if the word isn't in the list
        let result = "";
        for (let i = 0; i < cleanWord.length; i++) {
            let char = cleanWord[i];
            let nextChar = cleanWord[i+1] || "";
            let doubleChunk = char + nextChar;

            if (CharacterMap[doubleChunk]) {
                result += CharacterMap[doubleChunk];
                i++; 
            } else if (CharacterMap[char]) {
                result += CharacterMap[char];
            } else {
                result += char;
            }
        }
        return result;
    }

    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const copyBtn = document.getElementById('copy-btn');
    const outputBox = document.getElementById('output-box');
    const status = document.getElementById('status');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let finalCommittedText = ""; 

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        
        // Listen to both language dialects smoothly
        recognition.lang = 'or-IN'; 

        recognition.onstart = () => {
            status.textContent = "🎙️ Listening... Speak your Odia dictionary words.";
            startBtn.disabled = true;
            stopBtn.disabled = false;
            finalCommittedText = outputBox.value; 
        };

        recognition.onerror = (e) => {
            status.textContent = "Status: Listening paused.";
            stopBtn.click();
        };

        recognition.onend = () => {
            status.textContent = "Mic turned off.";
            startBtn.disabled = false;
            stopBtn.disabled = true;
        };

        recognition.onresult = (event) => {
            let interimTranscript = '';
            let newFinalText = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                let textChunk = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    newFinalText += textChunk;
                } else {
                    interimTranscript += textChunk;
                }
            }

            if (newFinalText !== '') {
                let cleanFinal = processSentence(newFinalText);
                finalCommittedText += cleanFinal + " ";
            }

            let cleanInterim = processSentence(interimTranscript);
            outputBox.value = finalCommittedText + cleanInterim;
        };
    } else {
        status.textContent = "Voice input requires Google Chrome or Microsoft Edge.";
    }

    function processSentence(sentence) {
        if (!sentence) return "";
        let tokens = sentence.split(/\s+/);
        let convertedTokens = tokens.map(token => processWordThroughDictionary(token));
        return convertedTokens.join(" ");
    }

    // Typing system intercept mapping configuration
    outputBox.addEventListener('keydown', (e) => {
        if (e.key === ' ') {
            let cursorPosition = outputBox.selectionStart;
            let currentText = outputBox.value;

            let textBeforeCursor = currentText.substring(0, cursorPosition);
            let tokens = textBeforeCursor.split(/\s+/);
            let lastToken = tokens[tokens.length - 1];

            if (/^[a-zA-Z]+$/.test(lastToken.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g,""))) {
                let convertedWord = processWordThroughDictionary(lastToken);
                
                let startOfWordIdx = textBeforeCursor.lastIndexOf(lastToken);
                let updatedTextBefore = currentText.substring(0, startOfWordIdx) + convertedWord;
                let textAfterCursor = currentText.substring(cursorPosition);

                e.preventDefault(); 
                outputBox.value = updatedTextBefore + " " + textAfterCursor;
                let newCursorPos = updatedTextBefore.length + 1;
                outputBox.setSelectionRange(newCursorPos, newCursorPos);
            }
        }
    });

    startBtn.addEventListener('click', () => {
        if(recognition) recognition.start();
    });

    stopBtn.addEventListener('click', () => {
        if(recognition) recognition.stop();
    });

    copyBtn.addEventListener('click', () => {
        outputBox.select();
        navigator.clipboard.writeText(outputBox.value);
        const originalStatus = status.textContent;
        status.textContent = "Copied to clipboard! 📋";
        setTimeout(() => status.textContent = originalStatus, 2000);
    });
</script>

</body>
</html>
